<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>استظهار نتائج شهادة التعليم الابتدائي - دورة 2025</title>
  <style>
    :root{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif}
    body{background:#f5f7fb;color:#0b1733;margin:0;padding:20px}
    .container{max-width:900px;margin:20px auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 6px 22px rgba(8,30,50,0.08)}
    h1{margin:0 0 12px;font-size:20px;text-align:center}
    form{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
    input[type="text"]{padding:10px 12px;border:1px solid #d7dce6;border-radius:8px;width:320px;font-size:16px}
    button{padding:10px 14px;border-radius:8px;border:0;background:#0b63d6;color:#fff;font-weight:600;cursor:pointer}
    .result{margin-top:10px}
    .card{display:flex;gap:16px;align-items:center;border:1px solid #e6eefc;padding:16px;border-radius:10px}
    .avatar{width:100px;height:100px;border-radius:10px;background:linear-gradient(135deg,#eef7ff,#f7fbff);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0b63d6}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    td,th{padding:8px;border-bottom:1px dashed #eef3fb;text-align:center}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:700}
    .success{background:#e6f9ee;color:#0a7b3a}
    .fail{background:#fff0f0;color:#a61b1b}
    .note{font-size:14px;color:#334155;margin-top:8px}
    .meta{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
    .meta div{background:#f1f5f9;padding:8px 12px;border-radius:8px}
    .small{font-size:13px;color:#475569}
    @media (max-width:560px){form{flex-direction:column}input[type="text"]{width:100%}}
  </style>
</head>
<body>
  <div class="container">
    <h1>استظهار نتائج شهادة التعليم الابتدائي - دورة 2025</h1>
    <form id="searchForm" onsubmit="return false;">
      <input type="text" id="regInput" placeholder="أدخل رقم التسجيل (مثال: 19090905)" aria-label="رقم التسجيل" />
      <button id="searchBtn">بحث</button>
      <button id="showAllBtn" type="button" style="background:#10a37f">عرض الكل</button>
    </form>

    <div id="resultArea" class="result" aria-live="polite"></div>
  </div>

  <script>
    // بيانات المترشحين المدخلة (مثال). يمكن توصيل هذه البيانات بقاعدة بيانات حقيقية لاحقاً.
    const candidates = [
      {
        reg: '19090905',
        name: 'ريم بندومة',
        initialStatus: 'ناجحة',
        finalStatus: 'ناجحة',
        mention: 'جيد جدا',
        average: 8.00,
        grades: {
          'اللغة العربية': 9.25,
          'الرياضيات': 7.00,
          'اللغة الفرنسية': 7.50
        }
      },
      {
        reg: '15050509',
        name: 'مايا قيرود',
        initialStatus: 'راسبة',
        finalStatus: 'ناجحة بالانقاض',
        mention: null,
        average: 6.50, // معدل سنوي
        successAverage: 5.25, // معدل نجاح (مثال)
        grades: {
          'اللغة العربية': 7.50,
          'الرياضيات': 2.00,
          'اللغة الفرنسية': 3.50
        }
      }
    ];

    const resultArea = document.getElementById('resultArea');
    const searchBtn = document.getElementById('searchBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const regInput = document.getElementById('regInput');

    function formatNumber(n){return Number(n).toFixed(2)}

    function renderCandidate(c){
      const statusBadge = (c.finalStatus && c.finalStatus.includes('ناجح')) ? `<span class="badge success">${c.finalStatus}</span>` : `<span class="badge fail">${c.finalStatus || c.initialStatus}</span>`;
      let gradesRows = '';
      for(const subj in c.grades){
        gradesRows += `<tr><td>${subj}</td><td>${formatNumber(c.grades[subj])}</td></tr>`;
      }

      let mentionHtml = c.mention ? `<div class="meta"><div>التقدير: <strong>${c.mention}</strong></div></div>` : '';

      let extraHtml = '';
      if(c.successAverage !== undefined){
        extraHtml = `<div class="meta"><div>المعدل السنوي: <strong>${formatNumber(c.average)}</strong></div><div>معدل نجاح: <strong>${formatNumber(c.successAverage)}</strong></div></div>`;
      } else {
        extraHtml = `<div class="meta"><div>المعدل العام: <strong>${formatNumber(c.average)}</strong></div></div>`;
      }

      return `
      <div class="card" role="region" aria-label="نتيجة ${c.name}">
        <div class="avatar">${c.name.split(' ')[0]}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
            <div>
              <div style="font-size:18px;font-weight:700">${c.name}</div>
              <div class="small">رقم التسجيل: <strong>${c.reg}</strong></div>
              <div class="small">الحالة الابتدائية: ${c.initialStatus}</div>
            </div>
            <div style="text-align:left">${statusBadge}</div>
          </div>

          <table aria-label="علامات ${c.name}">
            <thead>
              <tr><th>المادة</th><th>العلامة</th></tr>
            </thead>
            <tbody>
              ${gradesRows}
            </tbody>
          </table>

          ${mentionHtml}
          ${extraHtml}
        </div>
      </div>
      `;
    }

    function showNotFound(reg){
      resultArea.innerHTML = `<div class="card"><div style="flex:1"><div style="font-weight:700">لم توجد نتيجة برقم التسجيل ${reg}</div><div class="note">تحقق من رقم التسجيل وأعد المحاولة أو تواصل مع المؤسسة التعليمية.</div></div></div>`;
    }

    function searchByReg(reg){
      const trimmed = reg.trim();
      if(!trimmed){ resultArea.innerHTML = '<div class="note">المرجو إدخال رقم التسجيل.</div>'; return; }
      const found = candidates.filter(c => c.reg === trimmed);
      if(found.length === 0){ showNotFound(trimmed); return; }
      resultArea.innerHTML = found.map(renderCandidate).join('<div style="height:12px"></div>');
    }

    searchBtn.addEventListener('click', ()=> searchByReg(regInput.value));
    regInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ e.preventDefault(); searchByReg(regInput.value); } });

    showAllBtn.addEventListener('click', ()=>{ resultArea.innerHTML = candidates.map(renderCandidate).join('<div style="height:12px"></div>'); });

    // عرض افتراضي: لا شيء
    resultArea.innerHTML = '<div class="note">أدخل رقم التسجيل ثم اضغط "بحث" لعرض النتيجة.</div>';
  </script>
</body>
</html>
